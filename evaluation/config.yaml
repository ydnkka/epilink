experiment:
  name: "synthetic_epilink_robustness"
  description: >
    Synthetic evaluation under matched and generation-varied, inference-fixed
    settings. Incubation and testing delay are specified in the config using
    Gamma mean and CV, then translated to Gamma shape and scale during parsing.
  seed: 12345

paths:
  tree_path: "../../data/processed/scovmod/scovmod_tree.gml"

fixed_parameters:
  latent_shape: 3.38
  symptomatic_rate: 0.37
  symptomatic_shape: 1.0
  transmission_rate_ratio: 2.29
  fraction_sampled: 1.0
  genome_length: 29903
  synthetic_genome_length: 5000
  num_simulations: 10000
  target: ["ad(0)", "ca(0,0)"]
  maximum_depth: 0

generation_baseline:
  incubation:
    distribution: gamma
    mean: 5.505036
    cv: 0.4149770576
  testing_delay:
    distribution: gamma
    mean: 1.0
    cv: 1.0
  substitution_rate: 0.001
  relaxation: 0.33

inference_baseline:
  incubation:
    distribution: gamma
    mean: 5.505036
    cv: 0.4149770576
  testing_delay:
    distribution: gamma
    mean: 1.0
    cv: 1.0
  substitution_rate: 0.001
  relaxation: 0.33

perturbation_scales:
  positive: [0.75, 1.25]
  nonnegative: [0.0, 1.25]

perturbations:
  incubation_mean:
    target: incubation.mean
    scale: positive

  incubation_cv:
    target: incubation.cv
    scale: positive

  testing_delay_mean:
    target: testing_delay.mean
    scale: positive

  testing_delay_cv:
    target: testing_delay.cv
    scale: positive

  substitution_rate:
    target: substitution_rate
    scale: positive

  relaxation:
    target: relaxation
    scale: nonnegative

conditions:
  matched:
    description: >
      Data-generation parameters are taken from the active scenario.
      Inference parameters are matched to the same scenario.
    generation_source: scenario
    inference_source: scenario
    logit_training_source: scenario
    fixed_inference: false

  generation_varied_inference_fixed:
    description: >
      Data-generation parameters are taken from the active scenario.
      Inference parameters remain fixed at the inference baseline.
      Logistic classifiers are trained once on the baseline scenario and reused.
    generation_source: scenario
    inference_source: baseline
    logit_training_source: baseline
    fixed_inference: true

design:
  include_baseline_scenario: true
  loss_reference:
    condition: matched
    scenario: baseline

parameter_constraints:
  incubation_mean: "> 0"
  incubation_cv: "> 0"
  testing_delay_mean: "> 0"
  testing_delay_cv: "> 0"
  substitution_rate: "> 0"
  relaxation: ">= 0"

execution:
  evaluate_conditions:
    - matched
    - generation_varied_inference_fixed

  # Maximum parallel worker processes for non-baseline runs.
  # null  → one worker per CPU core (default).
  # 1     → disable parallelism (useful for debugging).
  max_workers: 6

  evaluate_kwargs:
    sparsification: null
    n_restarts: 10
    rng_seed: 12345
    training_fraction: 0.1
    return_classifier: true

outputs:
  directory: "../../results/synthetic_epilink_robustness"
  file_format: "csv"