name: Test Release

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'PEP 440 suffix (e.g., dev123, rc1, b1). Leave blank for dev${{ github.run_number }}.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set test version
        run: |
          SUFFIX="${{ inputs.version_suffix }}"
          if [ -z "$SUFFIX" ]; then
            SUFFIX="dev${GITHUB_RUN_NUMBER}"
          fi

          export EPILINK_SUFFIX="$SUFFIX"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'(?m)^version\\s*=\\s*"([^"]+)"', text)
          if not match:
            raise SystemExit("version not found in pyproject.toml")

          base_version = match.group(1)
          suffix = os.environ["EPILINK_SUFFIX"]
          new_version = f"{base_version}.{suffix}"

          new_text, count = re.subn(
              r'(?m)^version\\s*=\\s*"([^"]+)"',
              f'version = "{new_version}"',
              text,
              count=1,
          )
          if count != 1:
            raise SystemExit("failed to update version in pyproject.toml")
          path.write_text(new_text)
          print(f"Using test version: {new_version}")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/epilink
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload --repository-url https://test.pypi.org/legacy/ dist/*
