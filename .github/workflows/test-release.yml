name: Test Release

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g., rc1, beta1, test1)'
        required: false
        default: 'test1'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for version detection

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create unique test version
        run: |
          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Create a dev version tag that hatch-vcs will pick up
          # Format: v0.0.0.dev{run_number}+{sha}
          TEST_VERSION="v0.0.0.dev${{ github.run_number }}"
          echo "Creating test version tag: $TEST_VERSION"
          git tag -a "$TEST_VERSION" -m "Test release build ${{ github.run_number }}"
          git tag --list

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          # Show what version was built
          ls -la dist/
          echo "Built version:"
          python -c "from importlib.metadata import version; import sys; sys.path.insert(0, 'src'); import epilink; print(f'Version in package: {epilink.__version__ if hasattr(epilink, \"__version__\") else \"check dist files\"}')" || true

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/epilink
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

