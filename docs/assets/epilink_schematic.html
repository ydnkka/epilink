<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EpiLink schematic</title>
  <style>
    :root {
      --ink: #16324f;
      --muted: #5b6f84;
      --panel: rgba(255, 255, 255, 0.82);
      --border: rgba(47, 80, 110, 0.18);
      --bg-a: #f7fbff;
      --bg-b: #f4efe7;
      --bg-c: #eef4f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(108, 81, 179, 0.10), transparent 26rem),
        radial-gradient(circle at bottom left, rgba(45, 114, 168, 0.10), transparent 28rem),
        linear-gradient(135deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
    }

    main {
      max-width: 1660px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .hero {
      margin-bottom: 18px;
      padding: 0 4px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 2.8vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 68rem;
      font-size: 1.02rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .figure-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: 0 24px 70px rgba(22, 50, 79, 0.12);
      backdrop-filter: blur(10px);
      padding: 18px;
    }

    .figure-scroll {
      overflow: auto;
      border-radius: 24px;
      background: #ffffff;
      border: 1px solid rgba(47, 80, 110, 0.10);
    }

    .figure-scroll img {
      display: block;
      width: 100%;
      min-width: 1200px;
      height: auto;
    }

    .caption {
      margin: 14px 6px 4px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--muted);
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.95em;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <main>
<!--    <section class="hero">-->
<!--      <h1>EpiLink schematic</h1>-->
<!--      <p>Responsive preview page for the updated workflow diagram, now aligned with the testing-delay notation in the derivation and the two supported transmission-profile parameterisations.</p>-->
<!--    </section>-->

    <section class="figure-shell" aria-label="EpiLink workflow figure">
      <div class="figure-scroll">
        <img
          src="epilink_schematic.svg"
          alt="EpiLink workflow diagram showing observed testing dates and genetic distance, timing profiles, latent transmission scenarios, Monte Carlo temporal and genetic draws, and compatibility scoring."
        >
      </div>
<!--      <p class="caption">The HTML preview now uses <code>epilink_schematic.svg</code> as the single source of truth, which keeps the page and the vector artwork in sync while preserving horizontal scrolling on smaller screens.</p>-->
    </section>
  </main>
</body>
</html>
