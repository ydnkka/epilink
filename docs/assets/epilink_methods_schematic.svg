<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Schematic of epilink pairwise linkage inference</title>
  <desc id="desc">Observed pairwise temporal and genetic distances are evaluated with temporal and genetic compatibility models and combined into a final epilink linkage score.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f5ef"/>
      <stop offset="100%" stop-color="#efe8da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 22px Arial, Helvetica, sans-serif; fill: #475569; }
      .panel-title { font: 700 34px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .panel-subtitle { font: 400 20px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 1.8px; fill: #64748b; }
      .body { font: 400 22px Arial, Helvetica, sans-serif; fill: #334155; }
      .small { font: 400 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .mono { font: 600 24px 'Courier New', monospace; fill: #0f172a; }
      .mono-small { font: 600 20px 'Courier New', monospace; fill: #0f172a; }
      .panel { stroke: #bfd0e3; stroke-width: 2.2; rx: 30; ry: 30; filter: url(#shadow); }
      .card { stroke: #c8d7e8; stroke-width: 1.8; rx: 22; ry: 22; }
      .pill { stroke: #c8d7e8; stroke-width: 1.6; rx: 22; ry: 22; }
      .arrow { stroke: #475569; stroke-width: 4.5; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #d7e1ec; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="url(#bg)"/>

  <text x="900" y="74" text-anchor="middle" class="title">epilink pairwise linkage inference</text>
  <text x="900" y="112" text-anchor="middle" class="subtitle">Observed pairwise data are evaluated by temporal and genetic compatibility models, then combined into a single linkage estimate.</text>

  <rect x="88" y="170" width="360" height="570" class="panel" fill="#fffaf2"/>
  <text x="128" y="214" class="label">INPUTS</text>
  <text x="268" y="240" text-anchor="middle" class="panel-title">Observed pair</text>
  <text x="268" y="272" text-anchor="middle" class="panel-subtitle">One candidate pair of sampled cases</text>

  <rect x="126" y="320" width="126" height="134" class="card" fill="#ffffff"/>
  <circle cx="189" cy="354" r="12" fill="#9ec5d7"/>
  <text x="189" y="392" text-anchor="middle" class="body" style="font-weight:700;">Case i</text>
  <text x="189" y="425" text-anchor="middle" class="small">sample date s_i</text>
  <text x="189" y="452" text-anchor="middle" class="small">genome sequence</text>

  <rect x="284" y="320" width="126" height="134" class="card" fill="#ffffff"/>
  <circle cx="347" cy="354" r="12" fill="#e2b58f"/>
  <text x="347" y="392" text-anchor="middle" class="body" style="font-weight:700;">Case j</text>
  <text x="347" y="425" text-anchor="middle" class="small">sample date s_j</text>
  <text x="347" y="452" text-anchor="middle" class="small">genome sequence</text>

  <rect x="126" y="506" width="284" height="92" class="card" fill="#f8fbff"/>
  <text x="268" y="544" text-anchor="middle" class="body">Pairwise temporal distance</text>
  <text x="268" y="580" text-anchor="middle" class="mono">t_ij = | s_i - s_j |</text>

  <rect x="126" y="618" width="284" height="92" class="card" fill="#f8fbff"/>
  <text x="268" y="656" text-anchor="middle" class="body">Pairwise genetic distance</text>
  <text x="268" y="692" text-anchor="middle" class="mono">g_ij = SNP distance</text>

  <rect x="520" y="170" width="540" height="350" class="panel" fill="#edf8f5"/>
  <text x="560" y="214" class="label">TEMPORAL MODEL</text>
  <text x="790" y="240" text-anchor="middle" class="panel-title">Temporal compatibility</text>
  <text x="790" y="272" text-anchor="middle" class="panel-subtitle">Mechanistic E/P/I natural-history model</text>

  <rect x="560" y="320" width="120" height="56" class="pill" fill="#ffffff"/>
  <text x="620" y="344" text-anchor="middle" class="small" style="font-weight:700;">E</text>
  <text x="620" y="365" text-anchor="middle" class="small">latent</text>

  <rect x="730" y="320" width="120" height="56" class="pill" fill="#ffffff"/>
  <text x="790" y="344" text-anchor="middle" class="small" style="font-weight:700;">P</text>
  <text x="790" y="365" text-anchor="middle" class="small">presymptomatic</text>

  <rect x="900" y="320" width="120" height="56" class="pill" fill="#ffffff"/>
  <text x="960" y="344" text-anchor="middle" class="small" style="font-weight:700;">I</text>
  <text x="960" y="365" text-anchor="middle" class="small">symptomatic</text>

  <rect x="560" y="395" width="460" height="64" class="card" fill="#ffffff"/>
  <text x="790" y="422" text-anchor="middle" class="small">Derived quantities</text>
  <text x="790" y="447" text-anchor="middle" class="mono-small">U = E + P     and     G = E + Y</text>

  <rect x="560" y="456" width="460" height="72" class="card" fill="#ffffff"/>
  <text x="790" y="485" text-anchor="middle" class="small">Monte Carlo temporal filter</text>
  <text x="790" y="507" text-anchor="middle" class="mono-small">
    <tspan x="790" dy="0">K_T(t_ij) = mean_n [</tspan>
    <tspan x="790" dy="22">| t_ij + U_i - U_j | &lt;= G ]</tspan>
  </text>

  <rect x="520" y="548" width="540" height="300" class="panel" fill="#eef4fb"/>
  <text x="560" y="592" class="label">GENETIC MODEL</text>
  <text x="790" y="618" text-anchor="middle" class="panel-title">Genetic compatibility</text>
  <text x="790" y="650" text-anchor="middle" class="panel-subtitle">Molecular clock plus transmission-depth model</text>

  <rect x="560" y="692" width="210" height="60" class="pill" fill="#ffffff"/>
  <text x="665" y="718" text-anchor="middle" class="small" style="font-weight:700;">Clock model</text>
  <text x="665" y="742" text-anchor="middle" class="small">strict or relaxed</text>

  <rect x="810" y="692" width="210" height="60" class="pill" fill="#ffffff"/>
  <text x="915" y="718" text-anchor="middle" class="small" style="font-weight:700;">History classes</text>
  <text x="915" y="742" text-anchor="middle" class="small">m = 0 ... M intermediates</text>

  <rect x="560" y="772" width="460" height="64" class="card" fill="#ffffff"/>
  <text x="790" y="799" text-anchor="middle" class="small">Observed common-ancestry time</text>
  <text x="790" y="824" text-anchor="middle" class="mono-small">tmrca_obs ~ g_ij / (2 r)</text>

  <rect x="1180" y="255" width="530" height="400" class="panel" fill="#fff3ea"/>
  <text x="1220" y="299" class="label">OUTPUT</text>
  <text x="1445" y="325" text-anchor="middle" class="panel-title">Combined linkage estimate</text>
  <text x="1445" y="349" text-anchor="middle" class="panel-subtitle">
    <tspan x="1445" dy="0">Temporal support times genetic support</tspan>
    <tspan x="1445" dy="24">over selected transmission depths</tspan>
  </text>

  <rect x="1222" y="406" width="446" height="110" class="card" fill="#ffffff"/>
  <text x="1445" y="448" text-anchor="middle" class="mono-small">epilink_A(i,j) = K_T(t_ij)</text>
  <text x="1445" y="480" text-anchor="middle" class="mono-small">x sum over m in A of K_G_tilde(g_ij, m)</text>

  <rect x="1222" y="542" width="205" height="86" class="card" fill="#ffffff"/>
  <text x="1324.5" y="575" text-anchor="middle" class="small">Default analysis</text>
  <text x="1324.5" y="607" text-anchor="middle" class="mono-small">A = {0}</text>

  <rect x="1463" y="542" width="205" height="86" class="card" fill="#ffffff"/>
  <text x="1565.5" y="575" text-anchor="middle" class="small">Zero intermediates</text>
  <text x="1565.5" y="607" text-anchor="middle" class="small">direct or co-primary</text>

  <circle cx="1120" cy="475" r="28" fill="#ffffff" stroke="#9fb1c4" stroke-width="3"/>
  <text x="1120" y="484" text-anchor="middle" class="mono" style="font-size:26px;">x</text>

  <path d="M410 552 C465 552, 475 355, 520 355" class="arrow"/>
  <path d="M410 664 C470 664, 475 700, 520 700" class="arrow"/>
  <path d="M1060 355 C1090 355, 1095 408, 1110 445" class="arrow"/>
  <path d="M1060 700 C1090 700, 1095 560, 1110 505" class="arrow"/>
  <path d="M1148 475 C1164 475, 1168 475, 1180 475" class="arrow"/>

  <rect x="88" y="872" width="1622" height="190" class="panel" fill="#ffffff"/>
  <text x="128" y="916" class="label">DEFAULT INTERPRETATION</text>
  <text x="240" y="944" class="panel-title" style="font-size:32px;">Zero-intermediate interpretation</text>

  <line x1="900" y1="906" x2="900" y2="1028" class="divider"/>

  <text x="150" y="990" class="body" style="font-weight:700;">Genetic component</text>
  <text x="150" y="1024" class="body">
    <tspan x="150" dy="0">m = 0 includes either direct transmission or</tspan>
    <tspan x="150" dy="28">co-primary infection from a shared source.</tspan>
  </text>

  <text x="932" y="990" class="body" style="font-weight:700;">Temporal assumption</text>
  <text x="932" y="1024" class="body">
    <tspan x="932" dy="0">Co-primary cases are assumed to have been infected</tspan>
    <tspan x="932" dy="28">no more than one generation interval apart.</tspan>
  </text>
</svg>
